apiVersion: v1
kind: Namespace
metadata:
  name: ner-app
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: ner-config
  namespace: ner-app
data:
  API_URL: "http://ner-backend:8000"
  PORT: "8000"
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: ner-backend-hpa
  namespace: ner-app
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: ner-backend
  minReplicas: 2
  maxReplicas: 5
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: ner-frontend-hpa
  namespace: ner-app
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: ner-frontend
  minReplicas: 2
  maxReplicas: 4
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 75
