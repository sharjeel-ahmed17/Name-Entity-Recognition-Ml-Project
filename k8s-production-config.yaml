apiVersion: v1
kind: Namespace
metadata:
  name: ner-app-production
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: ner-backend-config
  namespace: ner-app-production
data:
  PORT: "8000"
  WORKERS: "4"
  LOG_LEVEL: "info"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: ner-frontend-config
  namespace: ner-app-production
data:
  API_URL: "http://ner-backend:8000"
  STREAMLIT_SERVER_HEADLESS: "true"
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: ner-backend-hpa
  namespace: ner-app-production
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: ner-backend
  minReplicas: 2
  maxReplicas: 8
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: ner-frontend-hpa
  namespace: ner-app-production
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: ner-frontend
  minReplicas: 2
  maxReplicas: 6
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 75
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
