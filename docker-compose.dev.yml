version: '3.9'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ner-backend-dev
    ports:
      - "8000:8000"
    environment:
      - PORT=8000
      - PYTHONUNBUFFERED=1
    volumes:
      - ./main.py:/app/main.py
      - ./ner.py:/app/ner.py
      - ./ner_model:/app/ner_model
    command: >
      sh -c "
      uvicorn main:app --host 0.0.0.0 --port 8000 --reload
      "
    networks:
      - ner-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    develop:
      watch:
        - action: sync
          path: ./main.py
          target: /app/main.py
        - action: sync
          path: ./ner.py
          target: /app/ner.py
        - action: rebuild
          path: ./pyproject.toml

  frontend:
    build:
      context: ./ui
      dockerfile: Dockerfile
    container_name: ner-frontend-dev
    ports:
      - "8501:8501"
    environment:
      - API_URL=http://backend:8000
      - STREAMLIT_SERVER_PORT=8501
      - STREAMLIT_SERVER_ADDRESS=0.0.0.0
      - STREAMLIT_SERVER_HEADLESS=true
    volumes:
      - ./app.py:/app/app.py
      - ./ui/.streamlit:/app/.streamlit
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - ner-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    develop:
      watch:
        - action: sync
          path: ./app.py
          target: /app/app.py
        - action: sync
          path: ./ui/.streamlit
          target: /app/.streamlit

networks:
  ner-network:
    driver: bridge
