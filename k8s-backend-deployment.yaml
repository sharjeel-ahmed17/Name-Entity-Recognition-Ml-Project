apiVersion: apps/v1
kind: Deployment
metadata:
  name: ner-backend
  labels:
    app: ner-backend
    tier: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ner-backend
  template:
    metadata:
      labels:
        app: ner-backend
        tier: backend
    spec:
      containers:
      - name: backend
        image: your-registry/ner-backend:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8000
          name: http
        env:
        - name: PORT
          value: "8000"
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 15
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 2
        securityContext:
          runAsNonRoot: true
          runAsUser: 1000
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false
          capabilities:
            drop:
            - ALL
---
apiVersion: v1
kind: Service
metadata:
  name: ner-backend
  labels:
    app: ner-backend
spec:
  selector:
    app: ner-backend
  type: ClusterIP
  ports:
  - port: 8000
    targetPort: 8000
    protocol: TCP
    name: http
